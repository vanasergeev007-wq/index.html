<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dota PRO | Root Access</title>
    <style>
        :root {
            --accent: #ff4655;
            --bg-dark: #0a0c0e;
            --sidebar-bg: #111419;
            --card-bg: #1a1d23;
            --border: #2d343c;
            --text-main: #ffffff;
            --text-dim: #949ba4;
            --win: #4caf50;
            --gold: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* МЕНЮ */
        aside {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; z-index: 100;
        }
        .nav-link {
            padding: 14px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer;
            color: var(--text-dim); font-weight: 600; transition: 0.2s; text-align: center;
        }
        .nav-link.active { background: var(--accent); color: white; }
        .admin-link { border: 1px dashed var(--gold); color: var(--gold) !important; display: none; }

        /* КОНТЕНТ */
        main { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; max-width: 1000px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ЭЛЕМЕНТЫ ROOT */
        .root-badge {
            background: var(--gold); color: #000; padding: 2px 8px; 
            border-radius: 4px; font-size: 10px; font-weight: 900; margin-left: 5px;
            display: none;
        }

        .admin-panel {
            background: #1c1c1c; border: 2px solid var(--gold);
            padding: 20px; border-radius: 12px; margin-top: 20px;
        }

        /* КНОПКА ВХОДА */
        .login-gate {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
        }
        .key-btn { background: none; border: none; color: #222; cursor: pointer; font-size: 12px; }

        /* МОБИЛКА */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside {
                width: 100%; height: 70px; flex-direction: row; position: fixed; bottom: 0; 
                padding: 10px; border-top: 1px solid var(--border); justify-content: space-around;
            }
            .nav-link { font-size: 11px; padding: 10px; margin: 0; flex: 1; }
            main { padding-bottom: 90px; }
        }
    </style>
</head>
<body>

    <div class="login-gate">
        <button class="key-btn" onclick="requestRoot()">[root_access]</button>
    </div>

    <aside>
        <h2 style="color: var(--accent); font-size: 18px; margin-bottom: 20px; text-align: center;">
            DOTA HUB <span id="rootBadge" class="root-badge">ROOT</span>
        </h2>
        <div class="nav-link active" onclick="showPage('counters', this)">Контрпики</div>
        <div class="nav-link" onclick="showPage('meta', this)">Мета</div>
        <div id="adminTab" class="nav-link admin-link" onclick="showPage('admin', this)">Admin Panel</div>
    </aside>

    <main>
        <section id="counters" class="page active">
            <h1>Контрпики</h1>
            <div id="counterList" style="margin-top: 20px;">Нажми на героя в консоли или выбери в меню...</div>
        </section>

        <section id="admin" class="page">
            <h1 style="color: var(--gold);">Root Dashboard</h1>
            <div class="admin-panel">
                <h3>Управление сайтом</h3>
                <br>
                <button onclick="changeMMR()" style="padding: 10px; background: var(--gold); border: none; font-weight: bold; cursor: pointer;">Накрутить MMR</button>
                <button onclick="hackMeta()" style="padding: 10px; background: white; border: none; font-weight: bold; cursor: pointer; margin-left: 10px;">Сменить Мету</button>
                <div id="logConsole" style="background: #000; color: #0f0; padding: 10px; font-family: monospace; margin-top: 20px; font-size: 12px; height: 100px; overflow-y: auto;">
                    > System ready...<br>
                    > Waiting for commands...
                </div>
            </div>
        </section>

        <section id="meta" class="page">
            <h1>Текущая Мета</h1>
            <p id="metaText" style="margin-top: 20px;">Загрузка актуальных данных...</p>
        </section>
    </main>

    <script>
        let isRoot = false;

        function requestRoot() {
            const pass = prompt("Введите секретный код доступа:");
            if (pass === "777") {
                isRoot = true;
                alert("Доступ разрешен. Права ROOT получены.");
                document.getElementById('adminTab').style.display = 'block';
                document.getElementById('rootBadge').style.display = 'inline-block';
                addLog("Root privileges granted.");
            } else {
                alert("Ошибка доступа.");
            }
        }

        function addLog(msg) {
            const console = document.getElementById('logConsole');
            console.innerHTML += `<br>> ${msg}`;
            console.scrollTop = console.scrollHeight;
        }

        function changeMMR() {
            const newMmr = Math.floor(Math.random() * (12000 - 8000) + 8000);
            addLog(`MMR updated to: ${newMmr}`);
            alert(`Ваш MMR теперь: ${newMmr} (Титан)`);
        }

        function hackMeta() {
            document.getElementById('metaText').innerHTML = "<b>ВНИМАНИЕ:</b> Техподдержка Valve подтвердила, что теперь Pudge — самый сильный керри патча!";
            addLog("Global meta hack applied.");
            alert("Мета успешно взломана!");
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
