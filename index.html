<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dota HUB | Admin Persistence</title>
    <style>
        :root {
            --accent: #ff4655;
            --bg-dark: #0a0c0e;
            --sidebar-bg: #111419;
            --card-bg: #16191d;
            --border: #2d343c;
            --text-main: #ffffff;
            --text-dim: #949ba4;
            --win: #4caf50;
            --gold: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        aside {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; z-index: 100;
        }
        .nav-link {
            padding: 14px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer;
            color: var(--text-dim); font-weight: 600; transition: 0.2s; text-align: center;
        }
        .nav-link.active { background: var(--accent); color: white; }
        .admin-link { border: 1px dashed var(--gold); color: var(--gold) !important; display: none; }

        main { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; max-width: 800px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; margin-top: 15px; }
        .hero-mini-card { aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; border: 2px solid transparent; cursor: pointer; }
        .hero-mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .hero-mini-card.selected { border-color: var(--accent); transform: scale(1.08); }

        .counter-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-top: 20px; }
        
        /* ADMIN TOOLS */
        .admin-panel { background: #1c1c1c; border: 1px solid var(--gold); padding: 20px; border-radius: 12px; }
        .admin-btn { padding: 12px; background: #333; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; margin: 5px; font-size: 12px; }
        .admin-btn:hover { background: var(--gold); color: #000; }
        .root-badge { background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; display: none; margin-left: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; height: 75px; flex-direction: row; position: fixed; bottom: 0; padding: 10px; border-top: 1px solid var(--border); border-right: none; }
            .nav-link { font-size: 11px; padding: 10px; flex: 1; margin: 0; }
            main { padding-bottom: 100px; }
            .desktop-hide { display: none; }
        }
    </style>
</head>
<body>

    <div style="position: fixed; top: 10px; right: 10px; z-index: 1000;">
        <button id="loginBtn" onclick="auth()" style="background: none; border: none; color: #222; font-size: 10px; cursor: pointer;">[access_key]</button>
    </div>

    <aside>
        <h2 class="desktop-hide" style="font-size: 18px; margin-bottom: 20px; color: var(--accent);">DOTA PRO<span id="badge" class="root-badge">ROOT</span></h2>
        <div class="nav-link active" onclick="showPage('counters', this)">Контрпики</div>
        <div class="nav-link" onclick="showPage('meta', this)">Мета</div>
        <div id="adminLink" class="nav-link admin-link" onclick="showPage('admin', this)">АДМИНКА</div>
    </aside>

    <main>
        <section id="counters" class="page active">
            <h1>Контрпики</h1>
            <div class="hero-grid">
                <div class="hero-mini-card" onclick="loadC('pudge', this)"><img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/pudge.png"></div>
                <div class="hero-mini-card" onclick="loadC('invoker', this)"><img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/invoker.png"></div>
                <div class="hero-mini-card" onclick="loadC('antimage', this)"><img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/antimage.png"></div>
                <div class="hero-mini-card" onclick="loadC('slark', this)"><img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/slark.png"></div>
            </div>
            <div class="counter-box">
                <h3 id="ct">Выбери героя...</h3>
                <div id="cl"></div>
            </div>
        </section>

        <section id="admin" class="page">
            <h1 style="color: var(--gold);">Root Console</h1>
            <div class="admin-panel" style="margin-top: 20px;">
                <p style="margin-bottom: 15px; font-size: 14px;">Статус: <span style="color: var(--win)">АВТОРИЗОВАН</span></p>
                
                <div style="border-top: 1px solid #333; padding-top: 15px;">
                    <button class="admin-btn" onclick="fakeWin()">Генерировать победы</button>
                    <button class="admin-btn" onclick="editHero()">Изменить данные героя</button>
                    <button class="admin-btn" onclick="resetAll()" style="color: var(--accent);">Выход / Сброс прав</button>
                </div>

                <div id="console" style="background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 15px; height: 120px; overflow: auto; border: 1px solid #444;">
                    > Root system active...
                </div>
            </div>
        </section>

        <section id="meta" class="page">
            <h1>Текущая Мета</h1>
            <p id="mt" style="margin-top: 20px; color: var(--text-dim);">Данные синхронизированы с Valve API...</p>
        </section>
    </main>

    <script>
        const db = {
            'pudge': [{n:'Lifestealer', d:'Feast крадет HP.'}],
            'invoker': [{n:'Anti-Mage', d:'Mana Break уничтожает.'}],
            'antimage': [{n:'Legion', d:'Duel не дает уйти.'}],
            'slark': [{n:'Bloodseeker', d:'Пассивка видит лоу-хп.'}]
        };

        // ПРОВЕРКА ПРИ ЗАГРУЗКЕ
        window.onload = () => {
            if (localStorage.getItem('isRoot') === 'true') {
                enableRoot();
            }
        };

        function auth() {
            if(prompt("Код доступа:") === "777") {
                localStorage.setItem('isRoot', 'true');
                enableRoot();
                alert("Доступ разрешен!");
            }
        }

        function enableRoot() {
            document.getElementById('adminLink').style.display = 'block';
            document.getElementById('badge').style.display = 'inline-block';
            document.getElementById('loginBtn').style.color = 'var(--gold)';
            log("Session restored from localStorage.");
        }

        function resetAll() {
            localStorage.removeItem('isRoot');
            location.reload();
        }

        function log(msg) {
            const c = document.getElementById('console');
            c.innerHTML += `<br>> ${msg}`;
            c.scrollTop = c.scrollHeight;
        }

        function fakeWin() {
            const r = Math.floor(Math.random()*100);
            log(`Success: Generated ${r} fake match wins.`);
        }

        function editHero() {
            const h = prompt("Какого героя изменить?");
            if(h) log(`Warning: Override values for ${h} saved in buffer.`);
        }

        function loadC(id, el) {
            document.querySelectorAll('.hero-mini-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            const l = document.getElementById('cl');
            document.getElementById('ct').innerText = `Контра для ${id.toUpperCase()}:`;
            l.innerHTML = '';
            db[id].forEach(c => {
                l.innerHTML += `<div style="background:#222; padding:10px; margin-bottom:5px; border-left:3px solid var(--win)"><b>${c.n}</b><br><small>${c.d}</small></div>`;
            });
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
